services:
  # База Данных PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: zmk_postgres
    restart: always
    environment:
      POSTGRES_USER: aleksandr
      POSTGRES_PASSWORD: password
      # POSTGRES_DB can only create one DB by default. We'll just use default "aleksandr" DB
      # or mount an init script. Let's create an init script to create 2 DBs.
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # Экземпляр PRODUCTION (Порт 8001)
  app_production:
    build: 
      context: .
    platform: linux/amd64
    container_name: zmk_production
    restart: always
    depends_on:
      - postgres
    ports:
      - "8001:3000"
    environment:
      - NODE_ENV=production
      - APP_TYPE=production
      - DATABASE_URL=postgresql://aleksandr:password@postgres:5432/zmk_production
    volumes:
      - ./logs/production:/app/logs
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1G

  # Экземпляр SUPPLY (Порт 8002)
  app_supply:
    build:
      context: .
    platform: linux/amd64
    container_name: zmk_supply
    restart: always
    depends_on:
      - postgres
    ports:
      - "8002:3000"
    environment:
      - NODE_ENV=production
      - APP_TYPE=supply
      - DATABASE_URL=postgresql://aleksandr:password@postgres:5432/zmk_production
    volumes:
      - ./logs/supply:/app/logs
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1G

  # Portainer (Графическая панель)
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  postgres_data:
  portainer_data:
